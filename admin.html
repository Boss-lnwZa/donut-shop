<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรับออเดอร์หน้าร้าน (Admin)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
            margin: 0; padding: 0;
        }
        body {
            background-color: #f0f2f5;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .no-orders {
            text-align: center;
            color: #888;
            padding: 40px;
            background: white;
            border-radius: 12px;
        }
        .order-card {
            background: white;
            border-left: 6px solid #e52e71;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }
        .customer-name {
            font-size: 18px;
            font-weight: 600;
            color: #e52e71;
        }
        .order-time {
            font-size: 13px;
            color: #888;
        }
        .item-list {
            list-style: none;
        }
        .item-list li {
            font-size: 16px;
            color: #333;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 รายการสั่งซื้อเข้าหน้าร้าน</h1>
    <div id="orderList">
        <div class="no-orders">ยังไม่มีออเดอร์เข้ามาในขณะนี้...</div>
    </div>
</div>

<script>
    const storageKey = 'donut_orders';
    const orderListDiv = document.getElementById('orderList');

    function renderOrders() {
        const savedOrders = JSON.parse(localStorage.getItem(storageKey) || '[]');

        if (!savedOrders.length) {
            orderListDiv.innerHTML = '<div class="no-orders">ยังไม่มีออเดอร์เข้ามาในขณะนี้...</div>';
            return;
        }

        orderListDiv.innerHTML = savedOrders.map(order => {
            const itemsHTML = order.items.map(item => `<li>• ${item.name} × ${item.qty} ชิ้น</li>`).join('');
            return `
                <div class="order-card">
                    <div class="order-header">
                        <span class="customer-name">👤 ${order.customerName}</span>
                        <span class="order-time">⏰ ${order.time}</span>
                    </div>
                    <ul class="item-list">${itemsHTML}</ul>
                </div>
            `;
        }).join('');
    }

    window.addEventListener('storage', renderOrders);
    window.setInterval(renderOrders, 1000);
    renderOrders();
</script>

</body>
</html>
